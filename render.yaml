services:
  - type: web
    name: loop1-sprint-goals
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Long timeout: a generate runs ~3 sequential LLM calls (tens of seconds) and
    # would be killed by gunicorn's default 30s timeout.
    startCommand: gunicorn wsgi:app --workers 1 --threads 4 --worker-class gthread --timeout 180 --bind 0.0.0.0:$PORT
    healthCheckPath: /ping
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # set in the Render dashboard (secret)
      - key: DATABASE_URL
        sync: false          # Neon connection string — set in the dashboard (secret)
      - key: PYTHON_VERSION
        value: "3.11.9"
